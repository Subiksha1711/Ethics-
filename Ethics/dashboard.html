<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethical AI Risk Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 3em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.2em;
            font-weight: 300;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 3em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: #666;
            margin-top: 10px;
            font-size: 0.95em;
            font-weight: 500;
        }

        /* Search */
        .search-section {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-input {
            flex: 1;
            padding: 18px 25px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 18px 40px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* AI Tools Grid */
        .tools-title {
            color: white;
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-height: 600px;
            overflow-y: auto;
            padding: 5px;
        }

        .tool-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 5px solid transparent;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .tool-card.risk-high {
            border-left-color: #ef4444;
        }

        .tool-card.risk-medium {
            border-left-color: #f59e0b;
        }

        .tool-card.risk-low {
            border-left-color: #10b981;
        }

        .tool-name {
            font-weight: 600;
            font-size: 1.2em;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .tool-company {
            color: #6b7280;
            font-size: 0.9em;
            margin-bottom: 12px;
        }

        .tool-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .risk-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            color: white;
        }

        .badge-high { background: #ef4444; }
        .badge-medium { background: #f59e0b; }
        .badge-low { background: #10b981; }

        .risk-score {
            font-size: 1.3em;
            font-weight: 700;
            color: #1f2937;
        }

        /* Results Section */
        .results-section {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            margin-bottom: 30px;
            display: none;
        }

        .results-section.active {
            display: block;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ai-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f3f4f6;
        }

        .ai-info h2 {
            font-size: 2.5em;
            color: #1f2937;
            margin-bottom: 10px;
        }

        .ai-info p {
            color: #6b7280;
            font-size: 1.1em;
        }

        /* Risk Score Display */
        .score-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .score-number {
            font-size: 6em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .score-label {
            font-size: 2em;
            font-weight: 600;
        }

        /* Component Breakdown */
        .breakdown-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 25px;
        }

        .breakdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .breakdown-card {
            background: #f9fafb;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
        }

        .breakdown-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .breakdown-title {
            font-weight: 600;
            color: #1f2937;
            font-size: 1.1em;
        }

        .breakdown-score {
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
        }

        .progress-bar {
            height: 12px;
            background: #e5e7eb;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.6s ease;
        }

        .breakdown-level {
            font-size: 0.9em;
            font-weight: 500;
            color: #6b7280;
        }

        /* Insights & Recommendations */
        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .insights-card {
            background: #f9fafb;
            padding: 30px;
            border-radius: 15px;
            border-left: 5px solid #667eea;
        }

        .insights-card.critical {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .insights-card.warning {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .insights-card.success {
            border-left-color: #10b981;
            background: #f0fdf4;
        }

        .insights-title {
            font-weight: 600;
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #1f2937;
        }

        .insights-list {
            list-style: none;
        }

        .insights-list li {
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
            color: #4b5563;
        }

        .insights-list li:last-child {
            border-bottom: none;
        }

        .recommendations-list {
            list-style: none;
            counter-reset: rec-counter;
        }

        .recommendations-list li {
            counter-increment: rec-counter;
            padding: 20px;
            margin-bottom: 15px;
            background: white;
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            position: relative;
            padding-left: 60px;
        }

        .recommendations-list li::before {
            content: counter(rec-counter);
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        /* Alerts */
        .alerts-container {
            margin-top: 30px;
        }

        .alert {
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }

        .alert-critical {
            background: #fef2f2;
            border: 2px solid #ef4444;
            color: #991b1b;
        }

        .alert-warning {
            background: #fffbeb;
            border: 2px solid #f59e0b;
            color: #92400e;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 80px;
            color: white;
            font-size: 1.5em;
            font-weight: 600;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .search-box {
                flex-direction: column;
            }

            .ai-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .score-number {
                font-size: 4em;
            }

            .insights-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Ethical AI Risk Assessment</h1>
            <p>Comprehensive AI ethics evaluation using machine learning and real-time monitoring</p>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalTools">-</div>
                <div class="stat-label">Total AI Tools</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="highRiskCount">-</div>
                <div class="stat-label">High Risk</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="medRiskCount">-</div>
                <div class="stat-label">Medium Risk</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgScore">-</div>
                <div class="stat-label">Average Score</div>
            </div>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Search AI tools (e.g., ChatGPT, Claude, Midjourney)...">
                <button class="btn" id="searchBtn" onclick="searchTool()">Analyze</button>
            </div>

            <div class="tools-title">📋 Available AI Tools (Click to analyze)</div>
            <div class="tools-grid" id="toolsGrid"></div>
        </div>

        <div class="loading" id="loadingIndicator">
            <div class="spinner"></div>
            Analyzing ethical risks... Please wait
        </div>

        <div class="results-section" id="resultsSection"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';

        window.onload = async function() {
            console.log('Loading dashboard...');
            await Promise.all([loadStatistics(), loadAllTools()]);
        };

        async function loadStatistics() {
            try {
                const response = await fetch(`${API_BASE}/statistics`);
                const stats = await response.json();
                document.getElementById('totalTools').textContent = stats.total_ai_tools;
                document.getElementById('highRiskCount').textContent = stats.risk_distribution.high;
                document.getElementById('medRiskCount').textContent = stats.risk_distribution.medium;
                document.getElementById('avgScore').textContent = stats.average_risk_score;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadAllTools() {
            try {
                const response = await fetch(`${API_BASE}/tools`);
                const data = await response.json();
                const grid = document.getElementById('toolsGrid');
                grid.innerHTML = '';

                data.tools.forEach(tool => {
                    const card = createToolCard(tool);
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function createToolCard(tool) {
            const card = document.createElement('div');
            card.className = `tool-card risk-${tool.risk_level.toLowerCase()}`;
            card.onclick = () => analyzeTool(tool.name);

            card.innerHTML = `
                <div class="tool-name">${tool.name}</div>
                <div class="tool-company">${tool.company}</div>
                <div class="tool-meta">
                    <span class="risk-badge badge-${tool.risk_level.toLowerCase()}">${tool.risk_level}</span>
                    <span class="risk-score">${tool.risk_score}</span>
                </div>
            `;
            return card;
        }

        async function searchTool() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return alert('Please enter a search term');

            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/search?q=${query}`);
                const data = await response.json();

                if (data.results.length === 1) {
                    analyzeTool(data.results[0].name);
                } else {
                    const grid = document.getElementById('toolsGrid');
                    grid.innerHTML = '';
                    data.results.forEach(tool => {
                        grid.appendChild(createToolCard(tool));
                    });
                }
            } catch (error) {
                alert('Search failed');
            }
            showLoading(false);
        }

        async function analyzeTool(aiName) {
            showLoading(true);
            hideResults();

            try {
                const response = await fetch(`${API_BASE}/tools/${aiName}`);
                
                if (response.status === 404) {
                    const errorData = await response.json();
                    displayNotFound(errorData);
                } else {
                    const assessment = await response.json();
                    displayResults(assessment);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Analysis failed. Please try again.');
            }
            showLoading(false);
        }

        function displayResults(data) {
            const section = document.getElementById('resultsSection');
            const risk = data.risk_assessment;
            const explanation = data.explanation;

            section.innerHTML = `
                <div class="ai-header">
                    <div class="ai-info">
                        <h2>${data.ai_system.name}</h2>
                        <p>${data.ai_system.company} • ${data.ai_system.domain}</p>
                    </div>
                </div>

                <div class="score-display" style="background: ${risk.risk_color}">
                    <div class="score-number">${risk.overall_score}</div>
                    <div class="score-label">${risk.risk_level} Risk</div>
                </div>

                <div class="breakdown-section">
                    <div class="section-title">📊 Risk Breakdown</div>
                    <div class="breakdown-grid">
                        ${Object.entries(risk.component_breakdown).map(([key, comp]) => `
                            <div class="breakdown-card">
                                <div class="breakdown-header">
                                    <div class="breakdown-title">${formatName(key)}</div>
                                    <div class="breakdown-score">${comp.score}</div>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${comp.score}%; background: ${getCompColor(comp.score)}"></div>
                                </div>
                                <div class="breakdown-level">${comp.level} Risk</div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="insights-grid">
                    ${explanation.key_insights.length > 0 ? `
                        <div class="insights-card">
                            <div class="insights-title">💡 Key Insights</div>
                            <ul class="insights-list">
                                ${explanation.key_insights.map(i => `<li>• ${i}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}

                    ${explanation.critical_concerns.length > 0 ? `
                        <div class="insights-card critical">
                            <div class="insights-title">🚨 Critical Concerns</div>
                            <ul class="insights-list">
                                ${explanation.critical_concerns.map(c => `<li>• ${c}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}

                    ${explanation.positive_aspects.length > 0 ? `
                        <div class="insights-card success">
                            <div class="insights-title">✓ Positive Aspects</div>
                            <ul class="insights-list">
                                ${explanation.positive_aspects.map(p => `<li>• ${p}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}
                </div>

                ${explanation.recommendations.length > 0 ? `
                    <div class="section-title">💼 Recommendations</div>
                    <ul class="recommendations-list">
                        ${explanation.recommendations.map(r => `<li>${r}</li>`).join('')}
                    </ul>
                ` : ''}

                ${data.realtime_insights.alerts.length > 0 ? `
                    <div class="alerts-container">
                        <div class="section-title">🔔 Real-time Alerts</div>
                        ${data.realtime_insights.alerts.map(a => `
                            <div class="alert alert-${a.level.toLowerCase()}">
                                <strong>[${a.level}]</strong> ${a.message}
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
            `;

            section.classList.add('active');
            section.scrollIntoView({ behavior: 'smooth' });
        }

        function displayNotFound(data) {
            const section = document.getElementById('resultsSection');
            
            section.innerHTML = `
                <div style="text-align: center; padding: 60px 20px;">
                    <div style="font-size: 5em; margin-bottom: 20px;">🔍</div>
                    <h2 style="font-size: 2.5em; color: #1f2937; margin-bottom: 15px;">AI Tool Not Found</h2>
                    <p style="font-size: 1.2em; color: #6b7280; margin-bottom: 40px;">
                        "${data.searched_name}" is not available in our dataset of 100 AI tools
                    </p>
                    
                    <div style="background: #f9fafb; padding: 30px; border-radius: 15px; margin-bottom: 40px; border-left: 5px solid #f59e0b;">
                        <p style="color: #92400e; font-size: 1.1em; font-weight: 500;">
                            💡 <strong>Suggestion:</strong> ${data.suggestion}
                        </p>
                    </div>
                </div>

                ${data.similar_tools && data.similar_tools.length > 0 ? `
                    <div class="section-title">🎯 Similar AI Tools You Can Analyze</div>
                    <div class="tools-grid">
                        ${data.similar_tools.map(tool => `
                            <div class="tool-card risk-${tool.risk_level.toLowerCase()}">
                                <div class="tool-name">${tool.name}</div>
                                <div class="tool-company">${tool.company} • ${tool.domain}</div>
                                <div class="tool-meta">
                                    <span class="risk-badge badge-${tool.risk_level.toLowerCase()}">${tool.risk_level}</span>
                                    <span class="risk-score">${tool.risk_score}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div style="text-align: center; margin-top: 30px;">
                        <p style="color: white; font-size: 1.1em; margin-bottom: 20px;">
                            Click on any tool above to see its complete ethical risk assessment
                        </p>
                    </div>
                ` : `
                    <div style="text-align: center; padding: 40px;">
                        <p style="color: #6b7280; font-size: 1.1em;">
                            No similar tools found. Try searching for popular AI tools like:
                        </p>
                        <div style="margin-top: 20px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                            <button class="btn" onclick="analyzeTool('Pinecone')" style="padding: 12px 25px; font-size: 14px;">Pinecone</button>
                            <button class="btn" onclick="analyzeTool('Groq')" style="padding: 12px 25px; font-size: 14px;">Groq</button>
                            <button class="btn" onclick="analyzeTool('Perplexity AI')" style="padding: 12px 25px; font-size: 14px;">Perplexity AI</button>
                            <button class="btn" onclick="analyzeTool('Cursor')" style="padding: 12px 25px; font-size: 14px;">Cursor</button>
                        </div>
                    </div>
                `}
            `;

            section.classList.add('active');
            section.scrollIntoView({ behavior: 'smooth' });
        }

        function formatName(name) {
            return name.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        function getCompColor(score) {
            if (score >= 70) return '#ef4444';
            if (score >= 45) return '#f59e0b';
            return '#10b981';
        }

        function showLoading(show) {
            document.getElementById('loadingIndicator').classList.toggle('active', show);
        }

        function hideResults() {
            document.getElementById('resultsSection').classList.remove('active');
        }
    </script>
</body>
</html>
