<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethical AI Risk Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-card: #333333;
            --text-primary: #ffffff;
            --text-secondary: #ffffff;
            --text-muted: #cccccc;
            --accent: #4a90e2;
            --border: #444444;
            --input-bg: #2d2d2d;
        }

        .light-theme {
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #333333;
            --text-secondary: #0c0c0c;
            --text-muted: #161515;
            --accent: #4a90e2;
            --border: #e0e0e0;
            --input-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(74, 144, 226, 0.05);
            border-radius: 20px;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 10px;
            cursor: pointer;
            font-size: 1.5em;
            transition: all 0.3s ease;
            z-index: 2;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.05);
        }

        .header h1 {
            font-size: 3em;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.2em;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.2);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-value {
            font-size: 3em;
            font-weight: 700;
            color: var(--accent);
            display: block;
            margin-bottom: 10px;
        }

        .stat-label {
            color: var(--text-secondary);
            margin-top: 10px;
            font-size: 0.95em;
            font-weight: 500;
        }

        /* Search Section */
        .search-section {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-input {
            flex: 1;
            padding: 18px 25px;
            font-size: 16px;
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            transition: all 0.3s ease;
            font-family: inherit;
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: var(--input-bg);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            padding: 18px 40px;
            font-size: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .tools-title {
            color: var(--text-primary);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
            color: var(--accent);
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-height: 600px;
            overflow-y: auto;
            padding: 5px;
        }

        .tool-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .tool-card:hover::before {
            opacity: 1;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .tool-card.risk-high {
            border-left: 4px solid #ef4444;
        }

        .tool-card.risk-medium {
            border-left: 4px solid #f59e0b;
        }

        .tool-card.risk-low {
            border-left: 4px solid #10b981;
        }

        .tool-name {
            font-weight: 600;
            font-size: 1.2em;
            color: var(--text-primary);
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .tool-company {
            color: var(--text-muted);
            font-size: 0.9em;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .tool-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .risk-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            color: white;
        }

        .badge-high { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .badge-medium { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .badge-low { background: linear-gradient(135deg, #10b981, #059669); }

        .risk-score {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            overflow-y: auto;
        }

        .modal.active {
            display: block;
        }

        .modal-content {
            background: var(--bg-card);
            margin: 5% auto;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(148, 163, 184, 0.2);
        }

        .modal-header h2 {
            font-size: 2.5em;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .close-btn {
            font-size: 2em;
            cursor: pointer;
            color: var(--text-muted);
            border: none;
            background: none;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: rgba(148, 163, 184, 0.1);
            color: #f1f5f9;
        }

        .modal-body {
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Results Section */
        .results-section {
            background: var(--bg-secondary);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            display: none;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .results-section.active {
            display: block;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ai-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid rgba(221, 227, 232, 0.2);
        }

        .ai-info h2 {
            font-size: 2.5em;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .ai-info p {
            color: var(--text-primary);
            font-size: 1.1em;
        }

        /* Risk Score Display */
        .score-display {
            background: var(--bg-secondary);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 40px;
            border: 1px solid var(--border);
        }

        .score-number {
            font-size: 6em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .score-label {
            font-size: 2em;
            font-weight: 600;
        }

        /* Component Breakdown */
        .breakdown-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 25px;
        }

        .breakdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .breakdown-card {
            background: var(--input-bg);
            padding: 25px;
            border-radius: 12px;
            border: 2px solid rgba(148, 163, 184, 0.2);
        }

        .breakdown-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .breakdown-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1.1em;
        }

        .breakdown-score {
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
        }

        .progress-bar {
            height: 12px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.6s ease;
        }

        .breakdown-level {
            font-size: 0.9em;
            font-weight: 500;
            color: #ffffff;
        }

        /* Insights & Recommendations */
        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .insights-card {
            background: var(--input-bg);
            padding: 30px;
            border-radius: 15px;
            border-left: 5px solid var(--accent);
            border: 1px solid var(--border);
        }

        .insights-card.critical {
            border-left-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .insights-card.warning {
            border-left-color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
        }

        .insights-card.success {
            border-left-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .insights-title {
            font-weight: 600;
            font-size: 1.3em;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .insights-list {
            list-style: none;
        }

        .insights-list li {
            padding: 12px 0;
            border-bottom: 1px solid rgba(234, 236, 240, 0.2);
            color: #ffffff;
        }

        .insights-list li:last-child {
            border-bottom: none;
        }

        .recommendations-list {
            list-style: none;
            counter-reset: rec-counter;
        }

        .recommendations-list li {
            counter-increment: rec-counter;
            padding: 20px;
            margin-bottom: 15px;
            background: var(--input-bg);
            border-radius: 10px;
            border: 2px solid rgba(148, 163, 184, 0.2);
            position: relative;
            padding-left: 60px;
            color: #ffffff;
        }

        .recommendations-list li::before {
            content: counter(rec-counter);
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        /* Alerts */
        .alerts-container {
            margin-top: 30px;
        }

        .alert {
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }

        .alert-critical {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid #ef4444;
            color: #fca5a5;
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            border: 2px solid #f59e0b;
            color: #fcd34d;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 80px;
            color: var(--text-primary);
            font-size: 1.5em;
            font-weight: 600;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 5px solid rgba(102, 126, 234, 0.3);
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Flash/Toast Notification */
        .flash-message {
            position: fixed;
            top: 30px;
            right: 30px;
            background: var(--bg-card);
            padding: 25px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border-left: 5px solid #f59e0b;
            border: 1px solid var(--border);
            z-index: 10000;
            max-width: 400px;
            animation: slideInRight 0.4s ease-out;
            display: none;
        }

        .flash-message.active {
            display: block;
        }

        .flash-message.fade-out {
            animation: slideOutRight 0.4s ease-in;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .flash-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .flash-title {
            font-size: 1.2em;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .flash-text {
            color: var(--text-secondary);
            font-size: 0.95em;
            line-height: 1.5;
        }

        .flash-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .flash-close:hover {
            background: rgba(148, 163, 184, 0.1);
            color: #f1f5f9;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #357abd;
        }

        .light-theme ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .light-theme ::-webkit-scrollbar-thumb {
            background: var(--accent);
        }

        .light-theme ::-webkit-scrollbar-thumb:hover {
            background: #357abd;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            .search-box {
                flex-direction: column;
            }
            .ai-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .score-number {
                font-size: 4em;
            }
            .insights-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="theme-toggle" id="themeToggle" title="Toggle Theme">🌙</button>
            <h1> Ethical AI Risk Assessment</h1>
            <p>Comprehensive AI ethics evaluation using machine learning and real-time monitoring</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalTools">0</div>
                <div class="stat-label">Total AI Tools</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgRiskScore">0</div>
                <div class="stat-label">Avg Risk Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="maxRiskScore">0</div>
                <div class="stat-label">Max Risk Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="minRiskScore">0</div>
                <div class="stat-label">Min Risk Score</div>
            </div>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Search AI tools by name, company, or domain...">
                <button class="btn" onclick="searchTools()">Search</button>
            </div>

            <div class="tools-title">Available AI Tools</div>
            <div class="tools-grid" id="toolsContainer"></div>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="detailsModal" class="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script src="app.js"></script>
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        // Check for saved theme preference or default to dark
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') {
            body.classList.add('light-theme');
            themeToggle.textContent = '☀️';
        } else {
            themeToggle.textContent = '🌙';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-theme');
            const isLight = body.classList.contains('light-theme');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });
    </script>
</body>
</html>
